name: quality

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python scripts
        run: python -m compileall analysis_scripts mrf_ui tools
      - name: Check repository structure
        run: python tools/quality_check.py
      - name: Check public-secret patterns
        run: |
          ! grep -RInE 'dsth[0-9]+|alogin[0-9]|/gpfs/home|etur[0-9]+|/home/dstech/DSTECH_WORKS' .
